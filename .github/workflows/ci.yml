name: CI

on:
  push:
    branches: [master, main, 'feat/**', 'fix/**']
  pull_request:
    branches: [master, main]

jobs:
  backend-typecheck:
    name: Backend TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OPSphere-CRM-Backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: OPSphere-CRM-Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

  frontend-typecheck:
    name: Frontend TypeScript + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opsphere-crm-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: opsphere-crm-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
